<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" fill="none">
  <!-- App shell -->
  <rect width="1240" height="760" rx="14" fill="#f5f4f0"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="216" height="760" rx="14" fill="#111"/>
  <rect x="108" y="0" width="108" height="760" fill="#111"/>

  <!-- Sidebar logo -->
  <rect x="20" y="20" width="30" height="30" rx="7" fill="white"/>
  <rect x="26" y="26" width="18" height="18" rx="3.5" fill="#111"/>
  <text font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="700" fill="white" x="58" y="40">Tovo</text>

  <!-- Sidebar nav -->
  <rect x="10" y="66" width="196" height="32" rx="8" fill="rgba(255,255,255,0.08)"/>
  <circle cx="28" cy="82" r="4.5" fill="#7c8b3a"/>
  <text font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="white" x="42" y="87">Brief</text>
  <circle cx="28" cy="118" r="4" fill="rgba(255,255,255,0.2)"/>
  <text font-family="-apple-system,sans-serif" font-size="12.5" fill="rgba(255,255,255,0.45)" x="42" y="122">Objects</text>
  <circle cx="28" cy="148" r="4" fill="rgba(255,255,255,0.2)"/>
  <text font-family="-apple-system,sans-serif" font-size="12.5" fill="rgba(255,255,255,0.45)" x="42" y="152">Capture</text>
  <circle cx="28" cy="178" r="4" fill="rgba(255,255,255,0.2)"/>
  <text font-family="-apple-system,sans-serif" font-size="12.5" fill="rgba(255,255,255,0.45)" x="42" y="182">Calendar</text>
  <circle cx="28" cy="208" r="4" fill="rgba(255,255,255,0.2)"/>
  <text font-family="-apple-system,sans-serif" font-size="12.5" fill="rgba(255,255,255,0.45)" x="42" y="212">Inbox</text>

  <!-- Sidebar user avatar -->
  <circle cx="108" cy="726" r="16" fill="rgba(255,255,255,0.1)"/>
  <text font-family="-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" x="96" y="730">L</text>

  <!-- Main content area -->
  <rect x="216" y="0" width="1024" height="760" fill="#f5f4f0"/>
  <rect x="216" y="0" width="1024" height="760" rx="0" fill="none"/>

  <!-- Top bar -->
  <rect x="216" y="0" width="1024" height="52" fill="rgba(245,244,240,0.95)"/>
  <line x1="216" y1="52" x2="1240" y2="52" stroke="#e0deda" stroke-width="1"/>
  <text font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="600" fill="#111" x="248" y="32">Morning Brief</text>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="#9c9a96" x="248" y="46">Monday · June 23</text>

  <!-- Good morning heading -->
  <text font-family="Georgia,'Times New Roman',serif" font-size="38" font-weight="400" fill="#111111" x="248" y="118">Good morning.</text>
  <text font-family="-apple-system,sans-serif" font-size="13" fill="#9c9a96" x="250" y="143">3 things changed since yesterday.</text>

  <!-- Section label: TODAY -->
  <text font-family="-apple-system,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b1b1af" x="250" y="178">TODAY</text>
  <line x1="250" y1="184" x2="740" y2="184" stroke="#e0deda" stroke-width="1"/>

  <!-- Card 1 -->
  <rect x="250" y="194" width="480" height="62" rx="8" fill="white"/>
  <rect x="250" y="194" width="3" height="62" rx="1.5" fill="#e8400d"/>
  <text font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#111" x="264" y="215">Q3 planning doc updated</text>
  <text font-family="-apple-system,sans-serif" font-size="12" fill="#6d6c6b" x="264" y="233">Maya added 3 slides · you're mentioned</text>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="#b1b1af" x="264" y="249">Document · 2h ago</text>

  <!-- Card 2 -->
  <rect x="250" y="264" width="480" height="62" rx="8" fill="white"/>
  <rect x="250" y="264" width="3" height="62" rx="1.5" fill="#7c8b3a"/>
  <text font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#111" x="264" y="285">Side project: landing page</text>
  <text font-family="-apple-system,sans-serif" font-size="12" fill="#6d6c6b" x="264" y="303">No update since Friday · flagged</text>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="#b1b1af" x="264" y="319">Thread · 3d ago</text>

  <!-- Section label: PEOPLE -->
  <text font-family="-apple-system,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b1b1af" x="250" y="358">PEOPLE</text>
  <line x1="250" y1="364" x2="740" y2="364" stroke="#e0deda" stroke-width="1"/>

  <!-- Person card -->
  <rect x="250" y="374" width="480" height="62" rx="8" fill="white"/>
  <rect x="250" y="374" width="3" height="62" rx="1.5" fill="#7c8b3a"/>
  <circle cx="272" cy="405" r="14" fill="#e2ddfd"/>
  <text font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="700" fill="#10054d" x="267" y="409">J</text>
  <text font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#111" x="292" y="396">Jordan (lawyer)</text>
  <text font-family="-apple-system,sans-serif" font-size="12" fill="#6d6c6b" x="292" y="413">Contract revision approved · email</text>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="#b1b1af" x="292" y="429">Legal · 4h ago</text>

  <!-- Right column panel -->
  <rect x="780" y="64" width="420" height="640" rx="10" fill="white"/>

  <!-- Capture header -->
  <text font-family="-apple-system,sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#b1b1af" x="806" y="98">CAPTURE</text>
  <line x1="806" y1="104" x2="1174" y2="104" stroke="#e0deda" stroke-width="1"/>
  <text font-family="Georgia,'Times New Roman',serif" font-size="18" font-weight="400" fill="#111" x="806" y="134">What's on your mind?</text>
  <rect x="806" y="145" width="358" height="1" fill="#ecebea"/>
  <rect x="806" y="158" width="56" height="22" rx="11" fill="#f4f3ef"/>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="#6d6c6b" x="815" y="173">Jordan</text>
  <rect x="870" y="158" width="64" height="22" rx="11" fill="#f4f3ef"/>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="#6d6c6b" x="879" y="173">IP clause</text>
  <rect x="942" y="158" width="50" height="22" rx="11" fill="#f4f3ef"/>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="#6d6c6b" x="951" y="173">Friday</text>
  <rect x="1098" y="190" width="66" height="28" rx="7" fill="#7c8b3a"/>
  <text font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="white" x="1112" y="208">Save →</text>

  <!-- Floating notification 1 -->
  <rect x="248" y="490" width="320" height="74" rx="10" fill="#1a1919"/>
  <text font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" x="268" y="512">Tovo · Brief update</text>
  <text font-family="Georgia,'Times New Roman',serif" font-size="15" fill="white" x="268" y="535">Good morning, Lorenzo.</text>
  <text font-family="-apple-system,sans-serif" font-size="11.5" fill="rgba(255,255,255,0.55)" x="268" y="553">3 things changed since yesterday.</text>

  <!-- Floating notification 2 -->
  <rect x="268" y="582" width="296" height="66" rx="10" fill="#1a1919"/>
  <text font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" x="286" y="602">Jordan (lawyer)</text>
  <text font-family="Georgia,'Times New Roman',serif" font-size="14" fill="white" x="286" y="622">Email arrived</text>
  <text font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" x="286" y="639">Contract revision approved</text>
