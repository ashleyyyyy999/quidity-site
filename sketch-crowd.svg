      <circle cx="1050" cy="283" r="21"/><line x1="1050" y1="304" x2="1050" y2="385" stroke-width="9"/><line x1="1017" y1="333" x2="1083" y2="327" stroke-width="8"/><line x1="1050" y1="385" x2="1028" y2="450" stroke-width="7"/><line x1="1050" y1="385" x2="1072" y2="450" stroke-width="7"/>
