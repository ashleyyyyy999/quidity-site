      <circle cx="990" cy="296" r="26"/><line x1="990" y1="322" x2="990" y2="414" stroke-width="12"/><line x1="951" y1="354" x2="1029" y2="346" stroke-width="10"/><line x1="990" y1="414" x2="965" y2="483" stroke-width="9"/><line x1="990" y1="414" x2="1015" y2="483" stroke-width="9"/>
      <circle cx="1130" cy="312" r="27"/><line x1="1130" y1="339" x2="1130" y2="432" stroke-width="12"/><line x1="1090" y1="370" x2="1170" y2="362" stroke-width="10"/><line x1="1130" y1="432" x2="1104" y2="502" stroke-width="9"/><line x1="1130" y1="432" x2="1156" y2="502" stroke-width="9"/>
