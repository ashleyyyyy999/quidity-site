    <!-- Backpack -->
    <rect x="694" y="290" width="16" height="64" rx="6" fill="#991b1b"/>
    <!-- Arms crossed -->
    <path d="M700 320 Q680 336 695 352" stroke="#dc2626" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M740 320 Q760 336 745 352" stroke="#dc2626" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M700 320 L740 332" stroke="#dc2626" stroke-width="16" stroke-linecap="round"/>
    <path d="M740 320 L700 332" stroke="#991b1b" stroke-width="14" stroke-linecap="round"/>
