      script.type = 'text/javascript';
      document.head.appendChild(script);
    }
    
    // Pages where HubSpot must load immediately
    const eagerLoadPaths = /^\/(demo|pricing)/;
    
    if (eagerLoadPaths.test(window.location.pathname)) {
      loadHubSpot();
      return;
    }
    
    // Lazy-load on first interaction for everything else
    const events = ['mousemove', 'scroll', 'keydown', 'touchstart', 'click'];
    function onInteraction() {
      loadHubSpot();
      events.forEach(e => window.removeEventListener(e, onInteraction, { passive: true }));
    }
    events.forEach(e => window.addEventListener(e, onInteraction, { passive: true }));
    
    // Failsafe: load after 5 seconds even without interaction
    setTimeout(loadHubSpot, 5000);
  })();
</script>

<script>
  (function() {
    let wistiaLoaded = false;
    
    function loadWistia() {
      if (wistiaLoaded) return;
      wistiaLoaded = true;
      
      const script = document.createElement('script');
      script.src = 'https://fast.wistia.com/player.js';
      script.async = true;
      document.head.appendChild(script);
    }
    
    function init() {
      const allPlayers = document.querySelectorAll('wistia-player');
      const demoModalPlayer = document.querySelector('.am-product-demo-modal wistia-player');
      const inlinePlayers = Array.from(allPlayers).filter(p => p !== demoModalPlayer);
      
      // If there are inline videos on the page, load Wistia immediately
      if (inlinePlayers.length > 0) {
        loadWistia();
        return;
      }
      
      // Demo button click (desktop)
      const demoButton = document.querySelector('#watch-demo');
      if (demoButton) {
        demoButton.addEventListener('click', loadWistia, { once: true });
      }
      
      // Mobile menu uses href="#product-demo" - detect any link to that hash
      document.querySelectorAll('a[href="#product-demo"], a[href*="#product-demo"]').forEach(link => {
        link.addEventListener('click', loadWistia, { once: true });
      });
      
      // URL hash on initial load OR when changed
      function checkHash() {
        if (window.location.hash === '#product-demo') {
          loadWistia();
        }
      }
      checkHash();
      window.addEventListener('hashchange', checkHash);
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>

<!-- Handle URL Parameters and Store in LocalStorage -->
<script defer>
  (function() {
    const url = new URL(https://www.quidity.com/ai/window.location.href);

    // Convert URL parameters to an object and decode values
    const paramsObj = Object.fromEntries(
      [...url.searchParams.entries()].map(([key, value]) => [key, decodeURI(value)])
    );

    // Store gclid in local storage if valid
    const isGclsrcValid = !paramsObj.gclsrc || paramsObj.gclsrc.includes('aw');
    if (paramsObj.gclid && isGclsrcValid) {
      localStorage.setItem('gclid', paramsObj.gclid);
    }

    // Store Partnerstack params
    if (paramsObj.ps_xid && paramsObj.ps_partner_key) {
      localStorage.setItem('partnerClickId', paramsObj.ps_xid);
      localStorage.setItem('partnerKey', atob(paramsObj.ps_partner_key));
      localStorage.setItem('partnerKeyCapturedAt', (new Date()).toISOString());
    }

    // Store UTM parameters
    const utmParams = Object.keys(paramsObj)
      .filter((param) => (
        param.startsWith('utm_') || ['gclid', 'gclsrc', 'ps_xid', 'ps_partner_key', 'oppref', 'olref'].includes(param)
      ))
      .reduce((obj, key) => {
        obj[key] = paramsObj[key];
        return obj;
      }, {});

    const UTM_PARAMS_KEY = 'utmParams';
    const MAX_HISTORY_AGE_DAYS = 90;
    const MAX_HISTORY_ENTRIES = 30;

    const pruneUtmParamsHistory = (historyEntries, now) => {
      if (!historyEntries) return [];
      const maxHistoryAgeMs = MAX_HISTORY_AGE_DAYS * 24 * 60 * 60 * 1000;

      return historyEntries
        .filter((entry) => {
          const changedAtMs = Date.parse(entry.changed_at);
          return Number.isFinite(changedAtMs) && now.getTime() - changedAtMs <= maxHistoryAgeMs;
        })
        .slice(-MAX_HISTORY_ENTRIES);
    };

    if (Object.keys(utmParams).length > 0) {
      const now = new Date();
      const nowIso = now.toISOString();
      const storedUtmParams = JSON.parse(localStorage.getItem(UTM_PARAMS_KEY))

      if (!storedUtmParams) {
        localStorage.setItem(
          UTM_PARAMS_KEY,
          JSON.stringify({
            ...utmParams,
            captured_at: nowIso,
            updated_at: nowIso,
            history: [],
          })
        );
      } else {
        const hasChanges = Object.keys(utmParams).some((key) => storedUtmParams[key] !== utmParams[key]);

        if (hasChanges) {
          const { history = [], ...previousValues } = storedUtmParams;
          const utmParamsHistory = pruneUtmParamsHistory(history, now);

          utmParamsHistory.push({
            changed_at: nowIso,
            previous_values: previousValues,
          });

          localStorage.setItem(
            UTM_PARAMS_KEY,
            JSON.stringify({
              ...utmParams,
              captured_at: storedUtmParams.captured_at || nowIso,
              updated_at: nowIso,
              history: utmParamsHistory,
            })
          );
        }
      }
    }
  })();
</script>

<script>
(function() {
  const transformText = (text) => text
    .replace(/'/g, '\u2019')
    .replace(/(^|\s)"/g, '$1\u201C')
    .replace(/"/g, '\u201D')
    .replace(/\u00A0/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .replace(/\s*\u2014\s*/g, ' \u2014 ');

  const SKIP_TAGS = new Set(['SCRIPT', 'STYLE', 'CODE', 'PRE', 'TEXTAREA', 'INPUT']);

  function fixText(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      const newText = transformText(node.textContent);
      if (newText !== node.textContent) node.textContent = newText;
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (SKIP_TAGS.has(node.tagName)) return;
      node.childNodes.forEach(fixText);
    }
  }

  function run() {
    fixText(document.body);
  }

  if ('requestIdleCallback' in window) {
    requestIdleCallback(run, { timeout: 2000 });
  } else {
    setTimeout(run, 1);
  }
})();
