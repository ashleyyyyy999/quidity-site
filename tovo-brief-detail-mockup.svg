<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 560" role="img" aria-label="Tovo brief detail">
  <defs>
    <filter id="bd-shadow"><feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#000" flood-opacity="0.16"/></filter>
    <clipPath id="bd-clip"><rect width="840" height="560" rx="12"/></clipPath>
  </defs>
  <g filter="url(#bd-shadow)"><rect width="840" height="560" rx="12" fill="#1c1813"/></g>
  <g clip-path="url(#bd-clip)">
    <!-- Dark title bar -->
    <rect width="840" height="44" fill="#111111"/>
    <circle cx="20" cy="22" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="22" r="6" fill="#27c93f"/>
    <text x="420" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Tovo · Morning Brief — Monday, June 23</text>
    <!-- Dark content area -->
    <rect x="0" y="44" width="840" height="516" fill="#1c1813"/>
    <!-- Left panel (compact) -->
    <rect x="0" y="44" width="200" height="516" fill="#111111"/>
    <line x1="200" y1="44" x2="200" y2="560" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="24" y="88" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="0.8">THIS MORNING</text>
    <!-- Brief nav items -->
    <rect x="8" y="100" width="184" height="28" rx="5" fill="rgba(255,255,255,0.08)"/>
    <circle cx="24" cy="115" r="4" fill="#22c55e"/>
    <text x="36" y="120" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="white">Monday, Jun 23</text>
    <circle cx="24" cy="151" r="4" fill="rgba(255,255,255,0.25)"/>
    <text x="36" y="156" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Sunday, Jun 22</text>
    <circle cx="24" cy="181" r="4" fill="rgba(255,255,255,0.25)"/>
    <text x="36" y="186" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Saturday, Jun 21</text>
