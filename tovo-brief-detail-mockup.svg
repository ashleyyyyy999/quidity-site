    <text x="240" y="92" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="24" font-weight="600" fill="white" letter-spacing="-0.5">Good morning, Lorenzo.</text>
    <text x="240" y="118" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Here is what changed while you were away.</text>
    <line x1="240" y1="136" x2="800" y2="136" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Brief item 1 - changed -->
    <text x="240" y="162" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.3)" letter-spacing="1.2">CHANGED SINCE YESTERDAY</text>
    <rect x="240" y="172" width="540" height="58" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="240" y="172" width="3" height="58" rx="1.5" fill="#f59e0b"/>
    <text x="258" y="193" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="500" fill="white">Side project launch</text>
    <text x="258" y="214" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Moved from "this week" to next Monday</text>
    <!-- Brief item 2 - attention -->
    <text x="240" y="258" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.3)" letter-spacing="1.2">NEEDS YOUR ATTENTION</text>
    <rect x="240" y="268" width="540" height="58" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <rect x="240" y="268" width="3" height="58" rx="1.5" fill="#ef4444"/>
    <text x="258" y="289" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="500" fill="white">Q3 planning doc</text>
    <text x="258" y="310" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Due 2 days ago · not started</text>
    <!-- Brief item 3 - on track -->
    <text x="240" y="354" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.3)" letter-spacing="1.2">ON TRACK</text>
    <rect x="240" y="364" width="540" height="58" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
    <rect x="240" y="364" width="3" height="58" rx="1.5" fill="#22c55e"/>
    <text x="258" y="385" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="500" fill="white">Read Atomic Habits</text>
    <text x="258" y="406" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Chapter 3 done · chapter 4 queued</text>
    <!-- Attribution note -->
    <text x="240" y="460" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">Every item is attributed to the note or event that triggered it.</text>
    <text x="240" y="478" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">Nothing in this brief was invented. It came from you.</text>
    <rect width="840" height="560" rx="12" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
