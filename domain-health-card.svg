<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" fill="none">
  <!-- Card background -->
  <rect width="520" height="300" rx="16" fill="white" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
  </defs>

  <!-- Header -->
  <rect width="520" height="56" rx="16" fill="#f8f7f5"/>
  <rect y="40" width="520" height="16" fill="#f8f7f5"/>
  <rect x="1" y="55" width="518" height="1" fill="#e8e5e0"/>

  <!-- Domain label -->
  <text x="24" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111">Domain quidity.com</text>

  <!-- Close button -->
  <text x="488" y="35" font-family="-apple-system, sans-serif" font-size="16" fill="#999">✕</text>

  <!-- Body text -->
  <text x="24" y="85" font-family="-apple-system, sans-serif" font-size="12" fill="#666">Ensure proper domain authentication to boost your email deliverability.</text>
  <text x="24" y="102" font-family="-apple-system, sans-serif" font-size="12" fill="#666">Learn more in our <tspan fill="#2563eb" text-decoration="underline">Knowledge Base</tspan>.</text>

  <!-- Divider -->
  <line x1="24" y1="118" x2="496" y2="118" stroke="#f0ede8" stroke-width="1"/>

  <!-- SPF row - green check -->
  <circle cx="36" cy="148" r="8" fill="#16a34a"/>
  <path d="M32 148 L35 151 L40 145" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="56" y="144" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#111">SPF</text>
  <text x="56" y="160" font-family="-apple-system, sans-serif" font-size="12" fill="#888">Sender Policy Framework record found.</text>

  <!-- Divider -->
  <line x1="24" y1="178" x2="496" y2="178" stroke="#f0ede8" stroke-width="1"/>

  <!-- DKIM row - green check -->
  <circle cx="36" cy="208" r="8" fill="#16a34a"/>
  <path d="M32 208 L35 211 L40 205" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="56" y="204" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#111">DKIM</text>
  <text x="56" y="220" font-family="-apple-system, sans-serif" font-size="12" fill="#888">DKIM signature is valid and matches the author domain.</text>

  <!-- Divider -->
  <line x1="24" y1="238" x2="496" y2="238" stroke="#f0ede8" stroke-width="1"/>

  <!-- DMARC row - green check -->
  <circle cx="36" cy="268" r="8" fill="#16a34a"/>
  <path d="M32 268 L35 271 L40 265" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="56" y="272" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#111">DMARC</text>
</svg>
